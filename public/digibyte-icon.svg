<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bright blue background for visibility at small sizes (fills entire icon) -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#1d4ed8"/>

  <!-- Game controller body (simple, high-contrast white) -->
  <rect x="14" y="23" width="36" height="20" rx="10" fill="#f9fafb" stroke="#020617" stroke-width="2.2"/>

  <!-- Left d-pad -->
  <rect x="20" y="28" width="4.5" height="12" rx="1" fill="#020617"/>
  <rect x="18" y="30.5" width="9" height="4.5" rx="1" fill="#020617"/>

  <!-- Right action buttons -->
  <circle cx="41" cy="30" r="3.2" fill="#22c55e" stroke="#065f46" stroke-width="1"/>
  <circle cx="46" cy="35" r="3.2" fill="#f97316" stroke="#9a3412" stroke-width="1"/>

  <!-- Small center indicator -->
  <circle cx="32" cy="32.5" r="1.6" fill="#38bdf8"/>
</svg>
